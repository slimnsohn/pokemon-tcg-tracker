<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Sealed</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0c0e14;
    --panel:     #14171f;
    --panel-2:   #1b1f2a;
    --line:      #262b38;
    --ink:       #eef1f6;
    --muted:     #7e879b;
    --accent:    #ffcb3d;   /* foil gold */
    --accent-2:  #4da3ff;   /* holo blue */
    --up:        #4ad991;
    --down:      #ff5b5b;
    --radius:    14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { background: var(--bg); overscroll-behavior-y: none; }
  body {
    font-family: "Space Grotesk", system-ui, sans-serif;
    color: var(--ink);
    min-height: 100vh;
    padding: 22px 16px calc(env(safe-area-inset-bottom) + 96px);
    background:
      radial-gradient(900px 500px at 80% -10%, rgba(77,163,255,0.10), transparent 60%),
      radial-gradient(700px 400px at 0% 0%, rgba(255,203,61,0.08), transparent 55%),
      var(--bg);
  }
  .wrap { max-width: 620px; margin: 0 auto; }

  /* ---- Hero: portfolio value (tracker tab) ---- */
  .hero {
    border: 1px solid var(--line);
    background: linear-gradient(180deg, var(--panel-2), var(--panel));
    border-radius: 20px;
    padding: 22px 22px 20px;
    position: relative; overflow: hidden;
  }
  .hero::after {
    content: ""; position: absolute; inset: 0;
    background: linear-gradient(115deg, transparent 30%, rgba(255,255,255,0.05) 45%, transparent 60%);
    pointer-events: none;
  }
  .eyebrow {
    font-family: "Spline Sans Mono", monospace;
    font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--muted);
  }
  .total {
    font-family: "Spline Sans Mono", monospace;
    font-size: 44px; font-weight: 600; letter-spacing: -1px;
    margin-top: 6px; line-height: 1; font-variant-numeric: tabular-nums;
  }
  .total .cents { color: var(--muted); font-size: 26px; }
  .hero-sub {
    margin-top: 10px; font-size: 13px; color: var(--muted);
    display: flex; gap: 14px; align-items: center; flex-wrap: wrap;
  }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--up); display: inline-block; }

  /* ---- Section label ---- */
  .barrow {
    display: flex; align-items: baseline; justify-content: space-between;
    margin: 26px 4px 12px;
  }
  .barrow h2 {
    font-size: 13px; font-weight: 500; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--muted);
  }
  .count { font-family: "Spline Sans Mono", monospace; font-size: 12px; color: var(--muted); }

  /* ---- Product rows (swipe to delete) ---- */
  .list { display: grid; gap: 10px; }

  .swipe {
    position: relative; border-radius: var(--radius); overflow: hidden;
    background: var(--down);
  }
  /* red delete button revealed behind the card; tappable */
  .swipe .delbg {
    position: absolute; top: 0; right: 0; bottom: 0;
    width: 96px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 4px;
    color: #fff; font-weight: 700; font-size: 13px;
    background: var(--down); border: none; cursor: pointer;
  }
  .swipe .delbg svg { width: 22px; height: 22px; }
  .swipe .delbg:active { background: #e04a4a; }

  .item {
    position: relative; z-index: 1;
    display: grid; grid-template-columns: 56px 1fr auto; gap: 14px; align-items: center;
    background: var(--panel); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 12px 14px;
    touch-action: pan-y;
    transition: transform 0.2s cubic-bezier(.22,.61,.36,1);
  }
  .item.dragging { transition: none; }
  .thumb {
    width: 56px; height: 56px; border-radius: 9px; object-fit: contain;
    background: #fff; padding: 3px;
  }
  .thumb.ph { background: var(--panel-2); }
  .pname {
    font-size: 14.5px; font-weight: 500; line-height: 1.3;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .pmeta { font-family: "Spline Sans Mono", monospace; font-size: 11px; color: var(--muted); margin-top: 4px; }
  .pmeta a { color: var(--accent-2); text-decoration: none; }
  .market-row {
    font-family: "Spline Sans Mono", monospace;
    font-size: 11px; color: var(--muted); margin-top: 6px;
  }
  .market-row b { color: var(--ink); font-weight: 600; }
  .pricebox { text-align: right; }
  .pmkt {
    font-family: "Spline Sans Mono", monospace;
    font-size: 19px; font-weight: 600; font-variant-numeric: tabular-nums;
  }
  .plabel { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); }
  .prange { font-family: "Spline Sans Mono", monospace; font-size: 11px; color: var(--muted); margin-top: 3px; }

  /* ---- Settings tab ---- */
  .card-box {
    border: 1px solid var(--line);
    background: linear-gradient(180deg, var(--panel-2), var(--panel));
    border-radius: 18px; padding: 20px;
  }
  .card-box h3 { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  .card-box p.sub { font-size: 13px; color: var(--muted); line-height: 1.5; margin-bottom: 16px; }
  .add { display: flex; gap: 8px; }
  .add input {
    flex: 1; min-width: 0;
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 12px; color: var(--ink);
    font: 14px/1.2 "Spline Sans Mono", monospace; padding: 14px;
  }
  .add input::placeholder { color: #4f5872; }
  .add input:focus { outline: none; border-color: var(--accent-2); }
  .add button {
    background: var(--accent); color: #1a1505; border: none;
    border-radius: 12px; font: 700 15px "Space Grotesk", sans-serif;
    padding: 0 20px; cursor: pointer; white-space: nowrap;
  }
  .add button:active { transform: translateY(1px); }
  .add button:disabled { opacity: 0.5; cursor: default; }
  .note { margin-top: 10px; font-size: 12px; min-height: 16px; color: var(--muted); }
  .note.err { color: var(--down); }
  .hint {
    margin-top: 18px; font-size: 12px; color: var(--muted); line-height: 1.6;
    border-top: 1px solid var(--line); padding-top: 14px;
  }

  /* ---- States ---- */
  .empty, .err-box {
    border: 1px dashed var(--line); border-radius: var(--radius);
    padding: 32px 20px; text-align: center; color: var(--muted);
    font-size: 14px; line-height: 1.6;
  }
  .err-box { color: var(--down); border-color: rgba(255,91,91,0.3); }
  .spin {
    width: 22px; height: 22px; border: 2px solid var(--line);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.7s linear infinite; margin: 28px auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---- Tab bar ---- */
  .tabbar {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 50;
    display: flex; justify-content: center; gap: 6px;
    padding: 10px 14px calc(env(safe-area-inset-bottom) + 12px);
    background: linear-gradient(180deg, rgba(12,14,20,0), rgba(12,14,20,0.92) 38%);
    backdrop-filter: blur(8px);
  }
  .tabbar .inner {
    display: flex; gap: 4px; background: var(--panel);
    border: 1px solid var(--line); border-radius: 14px; padding: 4px;
    width: 100%; max-width: 320px;
  }
  .tabbtn {
    flex: 1; border: none; background: none; color: var(--muted);
    font: 600 14px "Space Grotesk", sans-serif; padding: 11px 0;
    border-radius: 10px; cursor: pointer; display: flex; align-items: center;
    justify-content: center; gap: 7px;
  }
  .tabbtn svg { width: 17px; height: 17px; }
  .tabbtn.active { background: var(--panel-2); color: var(--ink); }
  .tabbtn.active svg { color: var(--accent); }

  .view { display: none; }
  .view.active { display: block; }

  @media (prefers-reduced-motion: reduce) {
    .spin { animation: none; }
    .item { transition: none; }
  }
</style>
</head>
<body>
<div class="wrap">

  <!-- ============ TRACKER TAB ============ -->
  <section class="view active" id="view-tracker">
    <div class="hero">
      <div class="eyebrow">Sealed Portfolio · market value</div>
      <div class="total" id="total">$0<span class="cents">.00</span></div>
      <div class="hero-sub">
        <span><span class="dot"></span> <span id="updated">—</span></span>
        <span id="itemcount">0 items</span>
      </div>
    </div>

    <div class="barrow">
      <h2>Tracking</h2>
      <span class="count" id="count"></span>
    </div>
    <div class="list" id="list"></div>
  </section>

  <!-- ============ SETTINGS TAB ============ -->
  <section class="view" id="view-settings">
    <div class="barrow" style="margin-top:4px">
      <h2>Settings</h2>
    </div>
    <div class="card-box">
      <h3>Add a product</h3>
      <p class="sub">Paste any TCGplayer product link. The name, image, and live price are pulled automatically.</p>
      <div class="add">
        <input id="url" type="url" inputmode="url" autocomplete="off"
               placeholder="https://www.tcgplayer.com/product/…">
        <button id="addbtn" onclick="add()">Add</button>
      </div>
      <div class="note" id="note"></div>
      <div class="hint">
        Tip: to remove an item, swipe it left on the Tracker tab to reveal the red Delete button, then tap it.
      </div>
    </div>
  </section>

</div>

<!-- ============ TAB BAR ============ -->
<nav class="tabbar">
  <div class="inner">
    <button class="tabbtn active" id="tab-tracker" onclick="showTab('tracker')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>
      Tracker
    </button>
    <button class="tabbtn" id="tab-settings" onclick="showTab('settings')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Settings
    </button>
  </div>
</nav>

<script>
  // ===== Apps Script /exec URL =====
  const API_URL = "https://script.google.com/macros/s/AKfycbwUr_Ryo9okzx7rCnVY5s0TgRsg4nM-zrW-_P1C3mcYNqFhBqocfQWmPRzhEtuTVbOjNw/exec";

  const $ = id => document.getElementById(id);
  const money = n => (n == null || isNaN(n)) ? "—" : "$" + Number(n).toFixed(2);

  function moneyBig(n) {
    if (n == null || isNaN(n)) return '$0<span class="cents">.00</span>';
    const [d, c] = Number(n).toFixed(2).split(".");
    return "$" + Number(d).toLocaleString() + '<span class="cents">.' + c + '</span>';
  }

  function setNote(msg, isErr) {
    const n = $("note");
    n.textContent = msg || "";
    n.className = "note" + (isErr ? " err" : "");
  }

  async function call(params) {
    const qs = new URLSearchParams(params).toString();
    const res = await fetch(API_URL + (API_URL.includes("?") ? "&" : "?") + qs);
    return res.json();
  }

  // ---- Tabs ----
  function showTab(name) {
    document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
    document.querySelectorAll(".tabbtn").forEach(b => b.classList.remove("active"));
    $("view-" + name).classList.add("active");
    $("tab-" + name).classList.add("active");
  }

  // ---- Render list ----
  function render(data) {
    const list = $("list");
    if (!data.items || !data.items.length) {
      list.innerHTML = '<div class="empty">Nothing tracked yet.<br>Go to Settings to add a product.</div>';
      $("total").innerHTML = moneyBig(0);
      $("updated").textContent = "—";
      $("itemcount").textContent = "0 items";
      $("count").textContent = "";
      return;
    }

    let total = 0;
    list.innerHTML = data.items.map(it => {
      const mkt = (it.market != null) ? Number(it.market) : null;
      if (mkt) total += mkt;

      const hasLow = it.lowest != null;
      const shipped = it.lowestShipped != null ? it.lowestShipped : null;
      // shipping = difference between all-in and item-only, if both present
      const shipCost = (hasLow && shipped != null) ? Math.max(0, shipped - it.lowest) : null;
      const shipLine = shipped != null
        ? (shipCost && shipCost > 0.01 ? `+ ${money(shipCost)} ship · ${money(shipped)} all-in` : `free ship · ${money(shipped)} all-in`)
        : "";

      const img = it.image
        ? `<img class="thumb" src="${it.image}" alt="" onerror="this.classList.add('ph');this.removeAttribute('src')">`
        : `<div class="thumb ph"></div>`;
      const link = it.url
        ? `<a href="${it.url}" target="_blank" rel="noopener">view on tcgplayer ↗</a>`
        : `#${it.productId}`;
      const sellers = (it.sellers != null) ? ` · ${it.sellers} sellers` : "";

      const listingHtml = hasLow
        ? `<div class="plabel">lowest listing</div>
           <div class="pmkt">${money(it.lowest)}</div>
           <div class="prange">${shipLine}</div>`
        : `<div class="plabel">lowest listing</div><div class="pmkt">—</div><div class="prange">no listings</div>`;

      return `<div class="swipe" data-id="${it.productId}">
        <button class="delbg" onclick="remove('${it.productId}')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
          Delete
        </button>
        <div class="item">
          ${img}
          <div class="pinfo">
            <div class="pname">${esc(it.name)}</div>
            <div class="pmeta">${link}</div>
            <div class="market-row">Market <b>${money(mkt)}</b>${sellers}</div>
          </div>
          <div class="pricebox">
            ${listingHtml}
          </div>
        </div>
      </div>`;
    }).join("");

    $("total").innerHTML = moneyBig(total);
    $("itemcount").textContent = data.items.length + (data.items.length === 1 ? " item" : " items");
    $("count").textContent = data.items.length;
    const t = data.fetchedAt ? new Date(data.fetchedAt) : new Date();
    $("updated").textContent = "Updated " + t.toLocaleTimeString([], {hour:'numeric', minute:'2-digit'});

    attachSwipe();
  }

  // ---- Swipe to reveal delete button ----
  const REVEAL = 96;        // px the card slides to expose the delete button
  const OPEN_AT = 40;       // px dragged past which we snap fully open on release

  function closeAll(except) {
    document.querySelectorAll(".item.open").forEach(c => {
      if (c !== except) { c.classList.remove("open"); c.style.transform = "translateX(0)"; }
    });
  }

  function attachSwipe() {
    document.querySelectorAll(".swipe").forEach(swipe => {
      const card = swipe.querySelector(".item");
      let startX = 0, startY = 0, dx = 0, base = 0, dragging = false, decided = false, horiz = false, moved = false;

      const onStart = e => {
        const t = e.touches ? e.touches[0] : e;
        startX = t.clientX; startY = t.clientY;
        base = card.classList.contains("open") ? -REVEAL : 0;
        dx = base; dragging = true; decided = false; horiz = false; moved = false;
        card.classList.add("dragging");
      };
      const onMove = e => {
        if (!dragging) return;
        const t = e.touches ? e.touches[0] : e;
        const mx = t.clientX - startX;
        const my = t.clientY - startY;
        if (!decided) {
          if (Math.abs(mx) > 6 || Math.abs(my) > 6) {
            decided = true;
            horiz = Math.abs(mx) > Math.abs(my);
            if (horiz) closeAll(card);   // close others as soon as a horizontal drag begins
          }
        }
        if (!horiz) return;              // vertical → let the page scroll
        if (e.cancelable) e.preventDefault();
        moved = true;
        dx = Math.min(0, Math.max(-REVEAL, base + mx));   // clamp between closed and open
        card.style.transform = `translateX(${dx}px)`;
      };
      const onEnd = () => {
        if (!dragging) return;
        dragging = false;
        card.classList.remove("dragging");
        // decide open vs closed based on how far it ended up
        if (dx <= -OPEN_AT) {
          card.classList.add("open");
          card.style.transform = `translateX(-${REVEAL}px)`;
        } else {
          card.classList.remove("open");
          card.style.transform = "translateX(0)";
        }
      };

      card.addEventListener("touchstart", onStart, { passive: true });
      card.addEventListener("touchmove", onMove, { passive: false });
      card.addEventListener("touchend", onEnd);
      card.addEventListener("touchcancel", onEnd);

      // tapping an open card (not on the delete button) closes it
      card.addEventListener("click", () => {
        if (!moved && card.classList.contains("open")) {
          card.classList.remove("open");
          card.style.transform = "translateX(0)";
        }
      });

      // mouse fallback for desktop testing
      card.addEventListener("mousedown", e => {
        onStart(e);
        const mm = ev => onMove(ev);
        const mu = () => { onEnd(); document.removeEventListener("mousemove", mm); document.removeEventListener("mouseup", mu); };
        document.addEventListener("mousemove", mm);
        document.addEventListener("mouseup", mu);
      });
    });

    // tap anywhere outside an open row closes it
    document.addEventListener("touchstart", e => {
      if (!e.target.closest(".swipe")) closeAll(null);
    }, { passive: true });
  }

  function showLoading() { $("list").innerHTML = '<div class="spin"></div>'; }

  async function load() {
    if (API_URL.includes("PASTE_YOUR")) {
      $("list").innerHTML = '<div class="err-box">Add your Apps Script /exec URL to API_URL near the top of index.html.</div>';
      return;
    }
    showLoading();
    try {
      const data = await call({ action: "list" });
      if (!data.ok) throw new Error(data.error || "Unknown error");
      render(data);
    } catch (err) {
      $("list").innerHTML = `<div class="err-box">Couldn't load. ${esc(String(err))}</div>`;
    }
  }

  async function add() {
    const input = $("url");
    const url = input.value.trim();
    if (!url) { setNote("Paste a link first.", true); return; }
    const btn = $("addbtn");
    btn.disabled = true; btn.textContent = "…";
    setNote("Looking it up…", false);
    try {
      const data = await call({ action: "add", url });
      if (!data.ok) { setNote(data.error || "Couldn't add that.", true); return; }
      input.value = "";
      setNote("Added — see the Tracker tab.", false);
      render(data);
    } catch (err) {
      setNote("Network error. Try again.", true);
    } finally {
      btn.disabled = false; btn.textContent = "Add";
    }
  }

  async function remove(id) {
    try {
      const data = await call({ action: "remove", id });
      if (data.ok) render(data);
    } catch (err) { load(); }
  }

  document.addEventListener("DOMContentLoaded", () => {
    $("url").addEventListener("keydown", e => { if (e.key === "Enter") add(); });
  });

  function esc(s) {
    return String(s).replace(/[&<>"']/g, c =>
      ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
  }

  load();
</script>
</body>
</html>
